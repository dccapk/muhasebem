<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080810">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Muhasebem">
<title>Muhasebem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg:#080810; --bg2:#0e0e1a; --card:#12121f; --card2:#181828;
  --border:#1e1e32; --border2:#262640;
  --accent:#7c6ff7; --accent2:#a89fff; --accent3:#5848e0;
  --glow:rgba(124,111,247,0.25);
  --green:#3dd68c; --red:#f05c7a; --orange:#f0b429; --purple:#c084fc;
  --text:#eeeef8; --text2:#8888aa; --text3:#44445a;
  --radius:14px; --radius2:10px; --radius3:8px;
  --font:'Space Grotesk',sans-serif;
  --display:'Syne',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
.light {
  --bg:#f2f2fa; --bg2:#e8e8f5; --card:#ffffff; --card2:#f0f0fc;
  --border:#d8d8f0; --border2:#c8c8e8;
  --accent:#5848e0; --accent2:#7c6ff7; --accent3:#3830b0;
  --glow:rgba(88,72,224,0.15);
  --green:#1a9960; --red:#d03060; --orange:#c07010; --purple:#8030c0;
  --text:#10101e; --text2:#404060; --text3:#8080a0;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:var(--font); }

/* ── NOISE TEXTURE OVERLAY ── */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.025; mix-blend-mode:overlay;
}

#app { display:flex; flex-direction:column; height:100vh; height:100dvh; position:relative; z-index:1; }

/* ── TOPBAR ── */
#topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 10px; background:var(--bg); border-bottom:1px solid var(--border); flex-shrink:0; z-index:10; }
#topbar-title { font-family:var(--display); font-size:19px; font-weight:800; letter-spacing:-0.5px; }
#topbar-title span { color:var(--accent2); }
#topbar-actions { display:flex; gap:8px; }
.icon-btn { width:34px; height:34px; border-radius:8px; background:var(--card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:15px; transition:.15s; }
.icon-btn:active { transform:scale(0.92); }

/* ── NAV ── */
#content { flex:1; overflow:hidden; position:relative; }
.page { position:absolute; inset:0; overflow-y:auto; display:none; }
.page.active { display:block; }
.page-inner { padding:14px 14px 100px; }
#bottomnav { display:flex; background:var(--bg2); border-top:1px solid var(--border); flex-shrink:0; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 4px 10px; cursor:pointer; font-size:10px; font-weight:600; color:var(--text3); gap:4px; transition:.15s; letter-spacing:.3px; }
.nav-item svg { width:21px; height:21px; }
.nav-item.active { color:var(--accent2); }
.nav-item.active svg { filter:drop-shadow(0 0 6px var(--glow)); }
.nav-item:active { transform:scale(0.9); }

/* ── FAB ── */
#fab { position:fixed; bottom:72px; right:16px; z-index:100; width:48px; height:48px; border-radius:13px; background:var(--accent); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px var(--glow); cursor:pointer; font-size:22px; color:#fff; border:none; transition:.2s; }
#fab:active { transform:scale(0.9); }

/* ── CARDS ── */
.card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:10px; }
.card-sm { padding:10px 12px; }

/* ── SUMMARY GRID ── */
.summary-grid { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
.summary-grid-sub { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.summary-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius2); padding:13px; position:relative; overflow:hidden; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.summary-card.sc-main { padding:16px 18px; border-radius:var(--radius); }
.summary-card::before { content:''; position:absolute; top:0; right:0; width:70px; height:70px; border-radius:50%; opacity:0.07; transform:translate(25px,-25px); }
.sc-accent::before { background:var(--accent); }
.sc-green::before { background:var(--green); }
.sc-orange::before { background:var(--orange); }
.sc-purple::before { background:var(--purple); }
.summary-card .lbl { font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.8px; margin-bottom:5px; }
.summary-card.sc-main .lbl { font-size:11px; letter-spacing:1px; margin-bottom:7px; }
.summary-card .val { font-size:19px; font-weight:700; font-family:var(--mono); letter-spacing:-1px; }
.summary-card.sc-main .val { font-size:28px; letter-spacing:-1.5px; }
.summary-card .sub { font-size:10px; color:var(--text3); margin-top:3px; }
.summary-card.sc-main .sub { font-size:11px; margin-top:5px; }
.summary-card.sc-sub .val { font-size:15px; letter-spacing:-0.5px; }
.summary-card.sc-sub .lbl { font-size:9px; margin-bottom:4px; }
.summary-card.sc-sub .sub { font-size:9px; }
.sc-accent { border-color:rgba(124,111,247,0.2); background:rgba(124,111,247,0.05); }
.sc-green  { border-color:rgba(61,214,140,0.2);  background:rgba(61,214,140,0.05); }
.sc-orange { border-color:rgba(240,180,41,0.2);  background:rgba(240,180,41,0.05); }
.sc-purple { border-color:rgba(192,132,252,0.2); background:rgba(192,132,252,0.05); }

/* ── SECTION HEADERS ── */
.sec-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; margin-top:4px; }
.sec-title { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:1px; }
.sec-link { font-size:12px; color:var(--accent2); font-weight:600; cursor:pointer; }

/* ── EXPENSE ROWS ── */
.exp-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.exp-row:last-child { border-bottom:none; }
.exp-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.exp-info { flex:1; min-width:0; }
.exp-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.exp-meta { font-size:11px; color:var(--text3); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.exp-amt { font-size:13px; font-weight:600; font-family:var(--mono); flex-shrink:0; color:var(--red); }
.exp-date { font-size:10px; color:var(--text3); margin-top:2px; text-align:right; }

/* ── MONTH CHIPS ── */
.mscroll { display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none; margin-bottom:10px; }
.mscroll::-webkit-scrollbar { display:none; }
.mchip { flex-shrink:0; padding:5px 13px; border-radius:6px; border:1px solid var(--border); background:var(--card); font-size:11px; font-weight:600; cursor:pointer; transition:.15s; white-space:nowrap; color:var(--text2); letter-spacing:.2px; }
.mchip.active { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 2px 10px var(--glow); }
.mchip:active { transform:scale(0.93); }

/* ── PROGRESS ── */
.prog-row { margin-bottom:9px; }
.prog-lbl { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
.prog-lbl span:first-child { font-weight:600; color:var(--text2); }
.prog-lbl span:last-child { font-weight:600; font-family:var(--mono); color:var(--text2); }
.prog-bar { height:4px; border-radius:2px; background:var(--border2); overflow:hidden; }
.prog-fill { height:100%; border-radius:2px; transition:.4s; }

/* ── FORMS ── */
.form-grp { margin-bottom:12px; }
.form-lbl { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px; display:block; }
.form-inp { width:100%; padding:12px 14px; border-radius:var(--radius3); background:var(--card2); border:1px solid var(--border2); color:var(--text); font-size:15px; font-family:var(--font); outline:none; transition:.15s; }
.form-inp:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,111,247,0.12); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btn { width:100%; padding:14px; border-radius:var(--radius2); border:none; font-family:var(--font); font-size:15px; font-weight:600; cursor:pointer; transition:.15s; letter-spacing:.2px; }
.btn-p { background:var(--accent); color:#fff; box-shadow:0 3px 14px var(--glow); }
.btn-p:active { transform:scale(0.97); }
.btn-s { background:var(--card2); color:var(--text2); border:1px solid var(--border2); }

/* ── MODALS ── */
.modal-ov { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:.2s; backdrop-filter:blur(4px); }
.modal-ov.open { opacity:1; pointer-events:all; }
.modal-sheet { width:100%; background:var(--bg2); border-radius:18px 18px 0 0; border-top:1px solid var(--border); padding:12px 16px 32px; transform:translateY(100%); transition:.3s cubic-bezier(.4,0,.2,1); max-height:90vh; overflow-y:auto; }
.modal-ov.open .modal-sheet { transform:translateY(0); }
.m-handle { width:32px; height:3px; border-radius:2px; background:var(--border2); margin:0 auto 16px; }
.m-title { font-family:var(--display); font-size:17px; font-weight:800; margin-bottom:16px; letter-spacing:-0.3px; }

/* ── STATS ── */
.chart-wrap { position:relative; height:200px; margin:10px 0; }
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:10px; }
.stat-mini { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px; text-align:center; }
.stat-mini .sv { font-size:15px; font-weight:700; font-family:var(--mono); }
.stat-mini .sl { font-size:9px; color:var(--text3); margin-top:3px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }

/* ── SEARCH ── */
.search-box { display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius3); padding:10px 12px; margin-bottom:10px; }
.search-box input { flex:1; background:none; border:none; color:var(--text); font-size:14px; font-family:var(--font); outline:none; }
.search-box input::placeholder { color:var(--text3); }
.empty { text-align:center; padding:40px 20px; color:var(--text3); }
.empty-icon { font-size:36px; margin-bottom:8px; }

/* ── TOAST ── */
#toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--card2); border:1px solid var(--border2); border-radius:10px; padding:9px 16px; font-size:12px; font-weight:600; color:var(--text); z-index:500; opacity:0; transition:.3s; white-space:nowrap; pointer-events:none; letter-spacing:.2px; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.mhdr { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:1px; padding:10px 0 5px; display:flex; justify-content:space-between; }
.si-item { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--border); }
.si-item:last-child { border-bottom:none; }
.si-left { display:flex; align-items:center; gap:10px; }
.si-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.si-lbl { font-size:14px; font-weight:600; }
.si-sub { font-size:11px; color:var(--text3); margin-top:1px; }

/* ── PIN SCREEN ── */
#pin-screen {
  position:fixed; inset:0; background:var(--bg); z-index:1000;
  display:flex; flex-direction:column; align-items:center;
  padding:0 32px 0;
}
/* Top section — logo + title pushed up */
#pin-top {
  display:flex; flex-direction:column; align-items:center;
  padding-top:14vh;
  flex:0 0 auto;
}
.pin-logo { margin-bottom:14px; }
.pin-title {
  font-family:var(--display); font-size:22px; font-weight:800;
  letter-spacing:-0.5px; margin-bottom:6px;
}
/* DC signature */
.pin-sig {
  display:flex; align-items:center; gap:10px; margin-bottom:6px;
}
.pin-sig-line { height:1px; width:24px; background:linear-gradient(to right, transparent, var(--accent)); opacity:0.6; }
.pin-sig-line.r { background:linear-gradient(to left, transparent, var(--accent)); }
.pin-sig-text {
  font-family:var(--mono); font-size:11px; font-weight:600;
  letter-spacing:5px; color:var(--accent2);
  text-shadow: 0 0 12px rgba(124,111,247,0.7), 0 0 24px rgba(124,111,247,0.3);
  position:relative;
}
.pin-sig-text::before {
  content:''; position:absolute; inset:-3px -6px;
  border-radius:4px;
  background:rgba(124,111,247,0.07);
  border:1px solid rgba(124,111,247,0.15);
}
.pin-sub { font-size:12px; color:var(--text3); margin-bottom:0; letter-spacing:.3px; }

/* Spacer */
#pin-spacer { flex:1; }

/* Bottom section — dots + grid pinned to bottom */
#pin-bottom {
  flex:0 0 auto;
  display:flex; flex-direction:column; align-items:center;
  padding-bottom:max(32px, env(safe-area-inset-bottom));
  width:100%;
}
.pin-dots { display:flex; gap:11px; margin-bottom:28px; }
.pin-dot { width:9px; height:9px; border-radius:50%; border:1.5px solid var(--border2); background:transparent; transition:.2s; }
.pin-dot.filled { background:var(--accent); border-color:var(--accent); box-shadow:0 0 8px var(--glow); }
.pin-dot.error { background:var(--red); border-color:var(--red); animation:shake .3s; }
.pin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; max-width:270px; }
.pin-key {
  height:60px; border-radius:12px;
  background:var(--card); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:500; cursor:pointer;
  transition:all .1s; font-family:var(--mono); color:var(--text);
}
.pin-key:active { transform:scale(0.92); background:var(--card2); box-shadow:0 0 0 1px var(--border2); }
.pin-key.empty { background:transparent; border-color:transparent; pointer-events:none; }
.pin-error { font-size:12px; color:var(--red); font-weight:600; margin-top:14px; min-height:16px; text-align:center; letter-spacing:.2px; }

/* ── ACTION SHEET ── */
#act-ov { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:300; display:none; align-items:flex-end; backdrop-filter:blur(4px); }
#act-ov.open { display:flex; }
#act-sheet { width:100%; background:var(--bg2); border-radius:18px 18px 0 0; border-top:1px solid var(--border); padding:12px 16px 32px; }
.act-handle { width:32px; height:3px; border-radius:2px; background:var(--border2); margin:0 auto 14px; }
.act-title { font-size:12px; font-weight:600; color:var(--text3); margin-bottom:14px; text-align:center; letter-spacing:.2px; }
.act-btn { width:100%; padding:14px; border-radius:var(--radius2); border:none; font-family:var(--font); font-size:14px; font-weight:600; cursor:pointer; margin-bottom:8px; display:flex; align-items:center; gap:10px; letter-spacing:.2px; }
.act-edit { background:var(--card2); color:var(--text); border:1px solid var(--border2); }
.act-del { background:rgba(240,92,122,0.1); color:var(--red); border:1px solid rgba(240,92,122,0.2); }
.act-cancel { background:var(--card); color:var(--text2); border:1px solid var(--border); }

/* ── SYNC ── */
#sync-bar { position:fixed; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); z-index:999; opacity:0; transition:opacity .3s; }
#sync-bar.on { opacity:1; animation:sp 1.2s ease-in-out infinite; }
@keyframes sp { 0%{transform:scaleX(0) translateX(0)} 50%{transform:scaleX(0.6) translateX(40%)} 100%{transform:scaleX(0.1) translateX(100%)} }
/* ── CATEGORY DRUM PICKER ── */
#cat-picker-wrap { position:relative; }

#cat-picker-display {
  width:100%; padding:12px 14px; border-radius:var(--radius3);
  background:var(--card2); border:1px solid var(--border2);
  display:flex; align-items:center; gap:10px; cursor:pointer;
  transition:.15s; user-select:none;
}
#cat-picker-display:active { border-color:var(--accent); }
#cat-picker-icon { font-size:18px; line-height:1; }
#cat-picker-label { flex:1; font-size:15px; font-weight:600; color:var(--text); font-family:var(--font); }
#cat-picker-arrow {
  font-size:18px; color:var(--text3); transition:transform .25s;
  display:inline-block; transform:rotate(90deg);
}
#cat-picker-wrap.drum-open #cat-picker-arrow { transform:rotate(-90deg); }
#cat-picker-wrap.drum-open #cat-picker-display {
  border-color:var(--accent);
  border-radius:var(--radius3) var(--radius3) 0 0;
  box-shadow:0 0 0 2px rgba(124,111,247,0.12);
}

#cat-drum-container {
  position:relative; overflow:hidden;
  height:260px;
  background:var(--card2);
  border:1px solid var(--accent);
  border-top:none;
  border-radius:0 0 var(--radius3) var(--radius3);
  box-shadow:0 0 0 2px rgba(124,111,247,0.12);
  touch-action:none;
  cursor:ns-resize;
  user-select:none;
}
/* Top & bottom fade masks */
#cat-drum-mask-top, #cat-drum-mask-bot {
  position:absolute; left:0; right:0; height:80px; pointer-events:none; z-index:3;
}
#cat-drum-mask-top {
  top:0;
  background:linear-gradient(to bottom, var(--card2) 0%, transparent 100%);
}
#cat-drum-mask-bot {
  bottom:0;
  background:linear-gradient(to top, var(--card2) 0%, transparent 100%);
}
/* Center highlight bar */
#cat-drum-highlight {
  position:absolute; left:0; right:0;
  top:50%; transform:translateY(-50%);
  height:52px; pointer-events:none; z-index:2;
  border-top:1px solid var(--border2);
  border-bottom:1px solid var(--border2);
  background:rgba(124,111,247,0.07);
}
#cat-drum-track { position:absolute; inset:0; z-index:1; overflow:hidden; }
#cat-drum-items { position:absolute; left:0; right:0; will-change:transform; }
.cat-drum-item {
  height:52px; display:flex; align-items:center; gap:12px;
  padding:0 20px; cursor:pointer;
  -webkit-tap-highlight-color: transparent;
}
.cat-drum-item .di { font-size:20px; line-height:1; flex-shrink:0; opacity:0.4; transition:opacity .15s; }
.cat-drum-item .dl {
  font-size:15px; font-weight:600; color:var(--text3);
  font-family:var(--font); transition:color .15s;
}
.cat-drum-item.selected .dl { color:var(--text); font-weight:700; }
.cat-drum-item.selected .di { opacity:1; }

@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="topbar-title">Muhasebe<span>m</span></div>
    <div id="topbar-actions">
      <div class="icon-btn" onclick="fetchSheets()">🔄</div>
      <div class="icon-btn" onclick="openSearch()">🔍</div>
    </div>
  </div>
  <div id="content">
    <div class="page active" id="page-dash"><div class="page-inner">
      <div class="mscroll" id="ms-dash"></div>
      <div class="summary-grid" id="sum-grid"></div>
      <div class="sec-hdr"><span class="sec-title">Kategoriler</span><span class="sec-link" onclick="showPage('stats')">Grafikler →</span></div>
      <div class="card" id="cat-bars"></div>
      <div class="sec-hdr"><span class="sec-title">Son İşlemler</span><span class="sec-link" onclick="showPage('expenses')">Tümü →</span></div>
      <div class="card" id="recent"></div>
    </div></div>
    <div class="page" id="page-expenses"><div class="page-inner">
      <div class="mscroll" id="ms-exp"></div>
      <div class="search-box"><span>🔍</span><input type="text" id="exp-search" placeholder="Mağaza, açıklama ara..." oninput="renderExp()"></div>
      <div class="mscroll" id="cat-chips"></div>
      <div id="exp-list"></div>
    </div></div>
    <div class="page" id="page-stats"><div class="page-inner">

<div id="sync-bar"></div>
<div id="toast"></div>

<script>
const GS_URL = 'https://script.google.com/macros/s/AKfycbzQMTtj93dVrJw93yz18y8LfUPLs59Ml8aYNsne3h6khDA23JNBEEMG2HKsiUOHDx5D/exec';
const GS_TOKEN = 'dcc96';
const PIN = '969696';
const SESS_KEY = 'mhsb_s';

const CATS = {
  'Market-Gıda':     {i:'🛒',c:'#7ec8a0',b:'rgba(126,200,160,0.15)'},
  'Fatura-Abonelik': {i:'⚡',c:'#e8c17a',b:'rgba(232,193,122,0.15)'},
  'Kıyafet':         {i:'👕',c:'#b49ee0',b:'rgba(180,158,224,0.15)'},
  'Ulaşım-Araç':     {i:'🚗',c:'#7ec4c8',b:'rgba(126,196,200,0.15)'},
  'Online':          {i:'🛍️',c:'#d4956a',b:'rgba(212,149,106,0.15)'},
  'Sigorta-Vergi':   {i:'📋',c:'#a09080',b:'rgba(160,144,128,0.15)'},
  'Sağlık':          {i:'💊',c:'#e07878',b:'rgba(224,120,120,0.15)'},
  'Yatırım':         {i:'📈',c:'#e8c17a',b:'rgba(232,193,122,0.15)'},
  'Bağış':           {i:'🤲',c:'#7ec8a0',b:'rgba(126,200,160,0.15)'},
  'Diğer':           {i:'📦',c:'#b8ad9e',b:'rgba(184,173,158,0.15)'},
};
function gc(n){return CATS[n]||{i:'📦',c:'#b8ad9e',b:'rgba(184,173,158,0.15)'};}

let exps=[],curMonth=null,catFil=null,actExp=null;
let dc=null,bc=null,lc=null,curPage='dash';

function fmt(n){return new Intl.NumberFormat('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n)+'₺';}
function today(){return new Date().toISOString().slice(0,10);}
function gid(){return 'l'+Date.now()+'_'+Math.random().toString(36).slice(2,5);}
function mlabel(ym){const[y,m]=ym.split('-');return['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'][+m]+' '+y;}
function months(){
  const s=new Set(exps.map(e=>{
    const y=parseInt(e.date?.slice(0,4)),mo=parseInt(e.date?.slice(5,7));
    return(y>=2025&&y<=2030&&mo>=1&&mo<=12)?e.date.slice(0,7):null;
  }).filter(Boolean));
  return[...s].sort().reverse();
}
function fmonth(m){return m?exps.filter(e=>e.date?.startsWith(m)):exps;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function syncbar(on){const b=document.getElementById('sync-bar');b.classList.toggle('on',on);}

// THEME
function setTheme(n){
  document.documentElement.classList.toggle('light',n==='light');
  localStorage.setItem('mhsb_t',n);
  const d=document.getElementById('btn-dark'),l=document.getElementById('btn-light');
  if(d)d.style.borderColor=n==='dark'?'var(--accent)':'';
  if(l)l.style.borderColor=n==='light'?'var(--accent)':'';
}
setTheme(localStorage.getItem('mhsb_t')||'dark');

// PIN
let pbuf='';
function pPress(d){if(pbuf.length>=PIN.length)return;pbuf+=d;pdots();if(pbuf.length===PIN.length)setTimeout(pcheck,120);}
function pDel(){pbuf=pbuf.slice(0,-1);pdots();document.getElementById('pin-err').textContent='';}
function pdots(){document.querySelectorAll('.pin-dot').forEach((d,i)=>{d.classList.toggle('filled',i<pbuf.length);d.classList.remove('error');});}
function pcheck(){
  if(pbuf===PIN){sessionStorage.setItem(SESS_KEY,'1');document.getElementById('pin-screen').style.display='none';renderDash();fetchSheets();}
  else{document.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('error'));document.getElementById('pin-err').textContent='Hatalı şifre';setTimeout(()=>{pbuf='';pdots();document.getElementById('pin-err').textContent='';},800);}
}
if(sessionStorage.getItem(SESS_KEY)==='1'){document.getElementById('pin-screen').style.display='none';renderDash();fetchSheets();}

// NAV
function showPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');
  document.getElementById('nav-'+n).classList.add('active');
  curPage=n;
  if(n==='dash')renderDash();
  else if(n==='expenses')renderExp();
  else if(n==='stats')renderStats();
  else if(n==='settings')renderSettings();
}

// MONTH SELECTORS
function buildMS(){
  const ms=months();
  [['ms-dash','renderDash()'],['ms-exp','renderExp()'],['ms-stats','renderStats()'],['ms-settings','renderSettings()']].forEach(([id,fn],pi)=>{
    const el=document.getElementById(id);if(!el)return;
    let h='';
    if(pi===2)h+=`<div class="mchip${!curMonth?' active':''}" onclick="curMonth=null;buildMS();renderStats()">Tümü</div>`;
    ms.forEach(m=>{h+=`<div class="mchip${curMonth===m?' active':''}" onclick="curMonth='${m}';buildMS();${fn}">${mlabel(m)}</div>`;});
    el.innerHTML=h;
  });
}

// SHEETS
async function fetchSheets(){
  syncbar(true);
  try{
    const r=await fetch(GS_URL+'?token='+GS_TOKEN+'&t='+Date.now());
    const d=await r.json();
    if(d.error){syncbar(false);toast('⚠️ '+d.error);return;}
    exps=d.filter(r=>{
      if(!r.category||!r.date)return false;
      const y=parseInt(r.date.slice(0,4)),mo=parseInt(r.date.slice(5,7));
      return y>=2025&&y<=2030&&mo>=1&&mo<=12&&parseFloat(r.amount)>0;
    }).map(r=>({id:r.id||gid(),amount:parseFloat(r.amount),category:String(r.category).trim(),store:r.store||'',desc:r.desc||'',date:r.date.slice(0,10)}));
    const ms=months();
    if(ms.length&&(!curMonth||!ms.includes(curMonth)))curMonth=ms[0];
    if(curPage==='dash')renderDash();
    else if(curPage==='expenses')renderExp();
    else if(curPage==='stats')renderStats();
    syncbar(false);toast('✅ '+exps.length+' kayıt');
  }catch(e){syncbar(false);toast('⚠️ Bağlantı hatası');}
}
async function postSheets(e){
  try{await fetch(GS_URL,{method:'POST',body:JSON.stringify({token:GS_TOKEN,amount:e.amount,category:e.category,store:e.store||'',desc:e.desc||'',date:e.date})});}
  catch(x){toast('⚠️ Sheets yazma hatası');}
}
async function delSheets(row){
  try{await fetch(GS_URL+'?token='+GS_TOKEN+'&action=delete&row='+row);}
  catch(x){}
}

// ROW
function erow(e,click){
  const c=gc(e.category);
  const d=new Date(e.date);
  const ds=d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
  const oc=click?`onclick="openAct('${e.id}')" style="cursor:pointer"`:'';
  return`<div class="exp-row" ${oc}>
    <div class="exp-icon" style="background:${c.b}">${c.i}</div>
    <div class="exp-info"><div class="exp-name">${e.store||e.category}</div><div class="exp-meta">${e.desc||e.category}</div></div>
    <div style="text-align:right;flex-shrink:0"><div class="exp-amt">${fmt(e.amount)}</div><div class="exp-date">${ds}</div></div>
  </div>`;
}

// DASHBOARD
function renderDash(){
  buildMS();
  const es=fmonth(curMonth);
  const total=es.reduce((s,e)=>s+e.amount,0);
  const ct={};es.forEach(e=>{ct[e.category]=(ct[e.category]||0)+e.amount;});
  const sorted=Object.entries(ct).sort((a,b)=>b[1]-a[1]);
  let prev=0;
  if(curMonth){const[y,m]=curMonth.split('-').map(Number);const pm=m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,'0')}`;prev=fmonth(pm).reduce((s,e)=>s+e.amount,0);}
  const diff=prev?((total-prev)/prev*100).toFixed(0):null;
  document.getElementById('sum-grid').innerHTML=`
    <div class="summary-card sc-accent sc-main"><div class="lbl">Ay Toplamı</div><div class="val" style="color:var(--accent2)">${fmt(total)}</div><div class="sub">${curMonth?mlabel(curMonth):'Tüm zamanlar'}</div></div>
    <div class="summary-grid-sub">
      <div class="summary-card sc-sub ${diff!=null?(+diff>0?'sc-orange':'sc-green'):'sc-green'}"><div class="lbl">Önceki Ay</div><div class="val" style="color:${diff!=null?(+diff>0?'var(--orange)':'var(--green)'):'var(--text2)'}">${prev?fmt(prev):'—'}</div><div class="sub">${diff!=null?((+diff>0?'▲ +':'▼ ')+Math.abs(diff)+'%'):'—'}</div></div>
      <div class="summary-card sc-sub sc-purple"><div class="lbl">İşlem</div><div class="val" style="color:var(--purple)">${es.length}</div><div class="sub">kayıt</div></div>
      <div class="summary-card sc-sub"><div class="lbl">En Çok</div><div class="val" style="font-size:12px;color:var(--text2)">${sorted[0]?sorted[0][0].split('-')[0]:'—'}</div><div class="sub">${sorted[0]?fmt(sorted[0][1]):''}</div></div>
    </div>`;
  const mv=sorted[0]?.[1]||1;
  document.getElementById('cat-bars').innerHTML=sorted.slice(0,7).map(([c,v])=>{const cf=gc(c);return`<div class="prog-row"><div class="prog-lbl"><span>${cf.i} ${c}</span><span>${fmt(v)}</span></div><div class="prog-bar"><div class="prog-fill" style="width:${(v/mv*100).toFixed(0)}%;background:${cf.c}"></div></div></div>`;}).join('')||'<div class="empty"><div class="empty-icon">📊</div>Veri yok</div>';
  const rec=[...es].sort((a,b)=>{const dd=b.date.localeCompare(a.date);return dd!==0?dd:(parseInt(b.id.replace(/\D/g,''))||0)-(parseInt(a.id.replace(/\D/g,''))||0);}).slice(0,8);
  document.getElementById('recent').innerHTML=rec.length?rec.map(e=>erow(e,true)).join(''):'<div class="empty"><div class="empty-icon">💸</div>Henüz gider yok</div>';
}

// EXPENSES
function renderExp(){
  buildMS();
  const q=(document.getElementById('exp-search')?.value||'').toLowerCase();
  let es=fmonth(curMonth);
  if(q)es=es.filter(e=>(e.store+e.desc+e.category).toLowerCase().includes(q));
  if(catFil)es=es.filter(e=>e.category===catFil);
  const cnt={};fmonth(curMonth).forEach(e=>{cnt[e.category]=(cnt[e.category]||0)+1;});
  document.getElementById('cat-chips').innerHTML=`<div class="mchip${!catFil?' active':''}" onclick="catFil=null;renderExp()">Tümü</div>`+Object.entries(cnt).sort((a,b)=>b[1]-a[1]).map(([c])=>{const cf=gc(c);return`<div class="mchip${catFil===c?' active':''}" onclick="catFil='${c}';renderExp()">${cf.i} ${c}</div>`;}).join('');
  es=[...es].sort((a,b)=>{const dd=b.date.localeCompare(a.date);return dd!==0?dd:(parseInt(b.id.replace(/\D/g,''))||0)-(parseInt(a.id.replace(/\D/g,''))||0);});
  const el=document.getElementById('exp-list');
  if(!es.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>Sonuç bulunamadı</div>';return;}
  const grp={};es.forEach(e=>{if(!grp[e.date])grp[e.date]=[];grp[e.date].push(e);});
  const days=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const mns=['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  el.innerHTML=Object.entries(grp).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,items])=>{
    const d=new Date(date);
    return`<div class="mhdr"><span>${d.getDate()} ${mns[d.getMonth()+1]} — ${days[d.getDay()]}</span><span style="color:var(--red);font-family:var(--mono)">${fmt(items.reduce((s,e)=>s+e.amount,0))}</span></div><div class="card card-sm">${items.map(e=>erow(e,true)).join('')}</div>`;
  }).join('');
}

// STATS
function renderStats(){
  buildMS();
  const es=fmonth(curMonth);
  const total=es.reduce((s,e)=>s+e.amount,0);
  const ct={};es.forEach(e=>{ct[e.category]=(ct[e.category]||0)+e.amount;});
  const sorted=Object.entries(ct).sort((a,b)=>b[1]-a[1]);
  document.getElementById('stats-mini').innerHTML=`
    <div class="stat-mini"><div class="sv" style="color:var(--accent2)">${fmt(total)}</div><div class="sl">Toplam</div></div>
    <div class="stat-mini"><div class="sv" style="color:var(--orange)">${es.length}</div><div class="sl">İşlem</div></div>
    <div class="stat-mini"><div class="sv" style="color:var(--green)">${es.length?fmt(total/es.length):'0₺'}</div><div class="sl">Ortalama</div></div>`;
  if(dc)dc.destroy();

  if(curMonth){
    const dt={};es.forEach(e=>{const d=e.date.slice(8,10);dt[d]=(dt[d]||0)+e.amount;});

    lc=new Chart(document.getElementById('c-line').getContext('2d'),{type:'line',data:{labels:days,datasets:[{data:days.map(d=>dt[d]),borderColor:'#7ec8a0',backgroundColor:'rgba(126,200,160,0.08)',borderWidth:2,pointRadius:3,pointBackgroundColor:'#7ec8a0',fill:true,tension:0.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.parsed.y)}}},scales:{x:{ticks:{color:'rgba(120,113,104,1)',font:{size:9}},grid:{display:false},border:{display:false}},y:{ticks:{color:'rgba(120,113,104,1)',font:{size:9},callback:v=>(v/1000).toFixed(1)+'K'},grid:{color:'rgba(128,128,128,0.1)'},border:{display:false}}}}});

// SETTINGS
function renderSettings(){
  buildMS();
  // curMonth null ise en son ayı otomatik seç
  if(!curMonth){const ms=months();if(ms.length)curMonth=ms[0];}

  const total=exps.reduce((s,e)=>s+e.amount,0);

  // ── RUN-RATE ──
  let runRateHTML='';
  if(curMonth){
    const todayStr=today();
    const [ry,rm]=curMonth.split('-').map(Number);
    const daysInMonth=new Date(ry,rm,0).getDate();
    // Ayın kaçıncı günündeyiz (geçmiş ay ise son gün, bu ay ise bugün)
    const nowYM=todayStr.slice(0,7);
    let elapsed;
    if(nowYM===curMonth){
      elapsed=parseInt(todayStr.slice(8,10));
    } else {
      elapsed=daysInMonth; // geçmiş ay — tam ay harcandı
    }
    const es=fmonth(curMonth);
    const monthTotal=es.reduce((s,e)=>s+e.amount,0);
    const dailyRate=elapsed>0?monthTotal/elapsed:0;
    const isCurMonth=(nowYM===curMonth);
    const projected=isCurMonth?Math.round(dailyRate*daysInMonth):monthTotal;
    const pct=isCurMonth&&monthTotal>0?Math.round((projected/monthTotal-1)*100):0;
    const isOver=isCurMonth&&projected>monthTotal;
    const projColor=isCurMonth?(isOver?'var(--orange)':'var(--green)'):'var(--text2)';
    runRateHTML=`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;">
        <span style="font-size:14px;">📈</span>
        <span style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;">${isCurMonth?'Run-Rate — Ay Sonu Tahmini':'Ay Özeti'}</span>
      </div>
      <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px;">
        <div>
          <div style="font-size:10px;color:var(--text3);margin-bottom:3px;">${isCurMonth?'Tahmini toplam':'Gerçekleşen'}</div>
          <div style="font-size:22px;font-weight:700;font-family:var(--mono);letter-spacing:-1px;color:${projColor}">${fmt(projected)}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:10px;color:var(--text3);margin-bottom:3px;">Günlük ort.</div>
          <div style="font-size:14px;font-weight:600;font-family:var(--mono);color:var(--text2)">${fmt(Math.round(dailyRate))}</div>
        </div>
      </div>
      <div style="height:4px;border-radius:2px;background:var(--border2);overflow:hidden;margin-bottom:8px;">
        <div style="height:100%;border-radius:2px;background:${projColor};width:${Math.min(100,Math.round(elapsed/daysInMonth*100))}%;transition:.4s;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);">
        <span>${elapsed}. gün / ${daysInMonth} gün</span>
        <span>${isCurMonth?(isOver?'▲ +'+pct+'% artış bekleniyor':'Sabit seyir devam ederse'):'Ay tamamlandı'}</span>
      </div>
    </div>`;
  } else {
    runRateHTML=`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;color:var(--text3);font-size:13px;text-align:center;">Ay seçin → Run-Rate hesaplanır</div>`;
  }

  // ── ANOMALİ TESPİTİ ──
  let anomalyHTML='';
  const ms=months().slice(0,7); // bu ay + önceki 6 ay
  if(curMonth && ms.length>=2){
    const prevMonths=ms.filter(m=>m!==curMonth).slice(0,6);
    const curEs=fmonth(curMonth);
    // Kategoriye göre bu ayki harcamalar
    const curCat={};curEs.forEach(e=>{curCat[e.category]=(curCat[e.category]||0)+e.amount;});
    // Önceki aylarda kategori ortalamaları
    const prevCat={};
    prevMonths.forEach(m=>{
      fmonth(m).forEach(e=>{
        if(!prevCat[e.category])prevCat[e.category]=[];
        prevCat[e.category].push(e.amount);
      });
    });
    const catAvg={};
    Object.entries(prevCat).forEach(([cat,vals])=>{
      // Her ay için toplam al, sonra ortala
      const monthlyTotals={};
      prevMonths.forEach(m=>{
        const t=fmonth(m).filter(e=>e.category===cat).reduce((s,e)=>s+e.amount,0);
        if(t>0)monthlyTotals[m]=t;
      });
      const tots=Object.values(monthlyTotals);
      catAvg[cat]=tots.length?tots.reduce((a,b)=>a+b,0)/tots.length:0;
    });
    const anomalies=Object.entries(curCat)
      .filter(([cat,val])=>{
        const avg=catAvg[cat]||0;
        return avg>0 && val>avg*1.4;
      })
      .map(([cat,val])=>{
        const avg=catAvg[cat];
        const pct=Math.round((val/avg-1)*100);
        const cf=gc(cat);
        return{cat,val,avg,pct,cf};
      })
      .sort((a,b)=>b.pct-a.pct);

    if(anomalies.length){
      anomalyHTML=`
      <div style="background:var(--card);border:1px solid rgba(240,180,41,0.25);border-radius:var(--radius);padding:14px;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;">
          <span style="font-size:14px;">⚠️</span>
          <span style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;">Anomali Tespiti</span>
          <span style="margin-left:auto;background:rgba(240,180,41,0.15);border:1px solid rgba(240,180,41,0.3);color:var(--orange);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.3px;">${anomalies.length} sıra dışı</span>
        </div>
        ${anomalies.map(a=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
          <div style="width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:${a.cf.b};font-size:14px;flex-shrink:0;">${a.cf.i}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:12px;font-weight:600;">${a.cat}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:1px;">Ort. ${fmt(Math.round(a.avg))} → Bu ay ${fmt(Math.round(a.val))}</div>
          </div>
          <div style="background:rgba(240,180,41,0.12);border:1px solid rgba(240,180,41,0.25);color:var(--orange);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;font-family:var(--mono);flex-shrink:0;">+${a.pct}%</div>
        </div>`).join('')}
      </div>`;
    } else {
      anomalyHTML=`
      <div style="background:var(--card);border:1px solid rgba(61,214,140,0.2);border-radius:var(--radius);padding:14px;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:16px;">✅</span>
          <div>
            <div style="font-size:12px;font-weight:600;color:var(--green);">Anomali Yok</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px;">Tüm kategoriler normal aralıkta</div>
          </div>
        </div>
      </div>`;
    }
  } else if(curMonth){
    anomalyHTML=`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;color:var(--text3);font-size:13px;text-align:center;">Karşılaştırma için en az 1 önceki ay gerekli</div>`;
  }

  // ── VERİ ÖZETİ ──
  document.getElementById('data-sum').innerHTML=`
    ${runRateHTML}
    ${anomalyHTML}
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;">
        <span style="font-size:14px;">📊</span>
        <span style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;">Veri Özeti</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:var(--text3);font-size:13px;">Toplam işlem</span><span style="font-weight:700;font-family:var(--mono);">${exps.length}</span></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:var(--text3);font-size:13px;">Toplam harcama</span><span style="font-weight:700;font-family:var(--mono);">${fmt(total)}</span></div>
      <div style="display:flex;justify-content:space-between;"><span style="color:var(--text3);font-size:13px;">Ay sayısı</span><span style="font-weight:700;font-family:var(--mono);">${months().length}</span></div>
    </div>`;

  const t=localStorage.getItem('mhsb_t')||'dark';
  document.getElementById('btn-dark').style.borderColor=t==='dark'?'var(--accent)':'';
  document.getElementById('btn-light').style.borderColor=t==='light'?'var(--accent)':'';
}

function editExp(id){
  const e=exps.find(x=>x.id===id);if(!e)return;
  document.getElementById('m-title').textContent='Düzenle';
  document.getElementById('edit-id').value=id;
  document.getElementById('f-amt').value=e.amount;

  document.getElementById('f-store').value=e.store||'';
  document.getElementById('f-desc').value=e.desc||'';

}
function saveExp(){
  const amt=parseFloat(document.getElementById('f-amt').value);
  if(!amt||amt<=0){toast('❌ Tutar girin');return;}
  const id=document.getElementById('edit-id').value;
  const cat=document.getElementById('f-cat').value||CAT_LIST[drumIdx];
  const e={id:id||gid(),amount:amt,category:cat,store:document.getElementById('f-store').value.trim(),desc:document.getElementById('f-desc').value.trim(),date:document.getElementById('f-date').value||today()};
  if(id){const i=exps.findIndex(x=>x.id===id);if(i>=0)exps[i]=e;toast('✅ Güncellendi');}
  else{exps.push(e);postSheets(e);toast('✅ Kaydedildi');}
  closeCatPicker();
  closeModal('add-modal');
  if(curPage==='dash')renderDash();
  else if(curPage==='expenses')renderExp();
}

// MODALS
function openModal(id){document.getElementById(id).classList.add('open');}

// ── DRUM CATEGORY PICKER ──
const CAT_LIST = Object.keys(CATS);
const ITEM_H = 52;

let drumIdx = 0;
let drumY = 0;
let drumDragging = false;
let drumStartY = 0;
let drumStartOffset = 0;
let drumVelY = 0;
let drumPrevY = 0;
let drumPrevT = 0;
let drumRafId = null;
let drumMoved = false; // distinguish tap vs drag

function drumOffset(idx) {
  const container = document.getElementById('cat-drum-container');
  const h = container ? container.clientHeight : 260;
  return -(idx * ITEM_H) + h / 2 - ITEM_H / 2;
}

function drumClamp(idx) {
  return Math.max(0, Math.min(CAT_LIST.length - 1, idx));
}

function drumYToIdx(y) {
  const container = document.getElementById('cat-drum-container');
  const h = container ? container.clientHeight : 260;
  return Math.round((h / 2 - ITEM_H / 2 - y) / ITEM_H);
}

function drumCommit(idx, animated) {
  drumIdx = drumClamp(idx);
  drumY = drumOffset(drumIdx);
  drumApply(animated);
  const cat = CAT_LIST[drumIdx];
  const cf = gc(cat);
  document.getElementById('f-cat').value = cat;
  document.getElementById('cat-picker-icon').textContent = cf.i;
  document.getElementById('cat-picker-label').textContent = cat;
  // Update selected highlights
  document.querySelectorAll('.cat-drum-item').forEach((el, i) => {
    el.classList.toggle('selected', i === drumIdx);
  });
}

function drumApply(animated) {
  const track = document.getElementById('cat-drum-items');
  if (!track) return;
  track.style.transition = animated ? 'transform .22s cubic-bezier(.25,.8,.25,1)' : 'none';
  track.style.transform = `translateY(${drumY}px)`;
}

function openCatPicker() {
  const wrap = document.getElementById('cat-picker-wrap');
  const container = document.getElementById('cat-drum-container');
  if (wrap.classList.contains('drum-open')) { closeCatPicker(); return; }

  const itemsEl = document.getElementById('cat-drum-items');
  itemsEl.innerHTML = CAT_LIST.map((cat, i) => {
    const cf = gc(cat);
    return `<div class="cat-drum-item${i === drumIdx ? ' selected' : ''}" data-i="${i}">
      <span class="di">${cf.i}</span><span class="dl">${cat}</span>
    </div>`;
  }).join('');

  container.style.display = 'block';
  wrap.classList.add('drum-open');

  // Wait for layout then position
  requestAnimationFrame(() => {
    drumY = drumOffset(drumIdx);
    drumApply(false);

    // Click handler on items
    itemsEl.querySelectorAll('.cat-drum-item').forEach(el => {
      el.addEventListener('click', () => {
        const i = parseInt(el.dataset.i);
        drumCommit(i, true);
      });
    });

    // Touch drag
    container.addEventListener('touchstart', onDrumStart, {passive: false});
    container.addEventListener('touchmove',  onDrumMove,  {passive: false});
    container.addEventListener('touchend',   onDrumEnd,   {passive: false});
    // Mouse drag
    container.addEventListener('mousedown', onDrumMouseDown);
  });
}

function closeCatPicker() {
  const wrap = document.getElementById('cat-picker-wrap');
  const container = document.getElementById('cat-drum-container');
  if (!wrap.classList.contains('drum-open')) return;
  wrap.classList.remove('drum-open');
  container.style.display = 'none';
  cancelAnimationFrame(drumRafId);
  // Clone to remove all listeners
  const old = container;
  const clone = old.cloneNode(true);
  old.parentNode.replaceChild(clone, old);
}

function onDrumStart(e) {
  e.preventDefault();
  cancelAnimationFrame(drumRafId);
  drumDragging = true;
  drumMoved = false;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  drumStartY = clientY;
  drumStartOffset = drumY;
  drumVelY = 0;
  drumPrevY = clientY;
  drumPrevT = Date.now();
}

function onDrumMove(e) {
  e.preventDefault();
  if (!drumDragging) return;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const dy = Math.abs(clientY - drumStartY);
  if (dy > 4) drumMoved = true;

  const now = Date.now();
  const dt = Math.max(1, now - drumPrevT);
  drumVelY = (clientY - drumPrevY) / dt * 16;
  drumPrevY = clientY;
  drumPrevT = now;

  drumY = drumStartOffset + (clientY - drumStartY);
  // rubber-band at edges
  const maxY = drumOffset(0);
  const minY = drumOffset(CAT_LIST.length - 1);
  if (drumY > maxY) drumY = maxY + (drumY - maxY) * 0.3;
  if (drumY < minY) drumY = minY + (drumY - minY) * 0.3;
  drumApply(false);
}

function onDrumEnd(e) {
  if (!drumDragging) return;
  drumDragging = false;
  if (!drumMoved) return; // tap — let click handler handle it

  // fling
  let v = drumVelY;
  const maxY = drumOffset(0);
  const minY = drumOffset(CAT_LIST.length - 1);

  cancelAnimationFrame(drumRafId);
  function step() {
    drumY += v;
    v *= 0.86;
    if (drumY > maxY) { drumY = maxY; v = 0; }
    if (drumY < minY) { drumY = minY; v = 0; }
    drumApply(false);
    document.querySelectorAll('.cat-drum-item').forEach((el, i) => {
      el.classList.toggle('selected', i === drumClamp(drumYToIdx(drumY)));
    });
    if (Math.abs(v) > 0.4) {
      drumRafId = requestAnimationFrame(step);
    } else {
      drumCommit(drumYToIdx(drumY), true);
    }
  }
  drumRafId = requestAnimationFrame(step);
}

function onDrumMouseDown(e) {
  onDrumStart(e);
  const mm = ev => { ev.preventDefault(); onDrumMove(ev); };
  const mu = ev => { onDrumEnd(ev); window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); };
  window.addEventListener('mousemove', mm);
  window.addEventListener('mouseup', mu);
}
